        /* Blog Header */

        /* Blog Content */

        .blog-post {

        .category-list li {

        .recent-posts {

        .recent-post-item {

            gap: 15px;

        .recent-post-item img {

        .form-group {

        .form-group label {

            margin-bottom: 8px;

        .form-group input, .form-group textarea, .form-group select {

        .form-group textarea {

        .btn-save {

            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-save:hover {

        .delete-btn {

            border: none;

            border-radius: 4px;
            font-size: 12px;

        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .blog-header h1 {
                font-size: 32px;
            }
        }
    </style>

    <!-- Firebase SDK Scripts -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, getDocs, query, orderBy } from "firebase/firestore";

        // Firebase 설정 (사용자 제공)
        const firebaseConfig = {
          apiKey: "AIzaSyC4bxl2efr-a2qlCv9zclP-kaL106Bpvxc",
          authDomain: "garambudongsan.firebaseapp.com",
          projectId: "garambudongsan",
          storageBucket: "garambudongsan.firebasestorage.app",
          messagingSenderId: "610338625520",
          appId: "1:610338625520:web:7c113deb9334a302b62f35"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Elements
        const dynamicPostsContainer = document.getElementById('dynamic-posts');
        const categoryListContainer = document.getElementById('category-list');
        const recentPostsContainer = document.getElementById('recent-posts');

        // Load posts on startup
        document.addEventListener('DOMContentLoaded', loadBlogData);

        async function loadBlogData() {
            dynamicPostsContainer.innerHTML = '<p style="text-align:center; padding: 40px;">불러오는 중...</p>';
            
            try {
                // Fetch all posts (for categories and counts)
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                const posts = [];
                querySnapshot.forEach((doc) => {
                    posts.push({ id: doc.id, ...doc.data() });
                });

                // 1. Render Main Post List
                renderPosts(posts);

                // 2. Render Sidebar: Categories
                renderCategories(posts);

                // 3. Render Sidebar: Recent Posts (Top 5)
                renderRecentPosts(posts.slice(0, 5));

            } catch (error) {
                console.error("Error loading blog data: ", error);
                dynamicPostsContainer.innerHTML = '<p style="text-align:center; padding: 40px; color: red;">게시글을 불러오는 중 오류가 발생했습니다.</p>';
            }
        }

        function renderPosts(posts) {
            dynamicPostsContainer.innerHTML = ''; 
            if (posts.length === 0) {
                dynamicPostsContainer.innerHTML = '<p style="text-align:center; padding: 40px; color: var(--text-light);">등록된 게시글이 아직 없습니다.</p>';
                return;
            }

            posts.forEach((post) => {
                const postHTML = `
                    <article class="blog-post">
                        <img src="${post.image}" alt="${post.title}" onerror="this.src='https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80'">
                        <div class="post-content">
                            <div class="post-meta">
                                <span><i class="fa-solid fa-calendar"></i> ${post.date}</span>
                                <span><i class="fa-solid fa-user"></i> ${post.author}</span>
                                <span><i class="fa-solid fa-tag"></i> ${post.category}</span>
                            </div>
                            <h2 class="post-title">${post.title}</h2>
                            <p class="post-excerpt">${post.excerpt}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <a href="blog-detail.html?fbid=${post.id}" class="read-more">계속 읽기 (본문 보기) <i class="fa-solid fa-arrow-right"></i></a>
                            </div>
                        </div>
                    </article>
                `;
                dynamicPostsContainer.innerHTML += postHTML;
            });
        }

        function renderCategories(posts) {
            const categoriesMap = {};
            posts.forEach(post => {
                const cat = post.category || '기타';
                categoriesMap[cat] = (categoriesMap[cat] || 0) + 1;
            });

            categoryListContainer.innerHTML = '';
            Object.keys(categoriesMap).sort().forEach(cat => {
                const li = document.createElement('li');
                li.innerHTML = `${cat} <span>(${categoriesMap[cat]})</span>`;
                li.onclick = () => filterByCategory(cat);
                categoryListContainer.appendChild(li);
            });
        }

        function renderRecentPosts(recentPosts) {
            recentPostsContainer.innerHTML = '';
            recentPosts.forEach(post => {
                const itemHTML = `
                    <div class="recent-post-item" style="cursor:pointer;" onclick="window.location.href='blog-detail.html?fbid=${post.id}'">
                        <img src="${post.image}" alt="${post.title}" onerror="this.src='https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80'">
                        <div class="recent-post-info">
                            <h5>${post.title}</h5>
                            <span>${post.date}</span>
                        </div>
                    </div>
                `;
                recentPostsContainer.innerHTML += itemHTML;
            });
        }

        function filterByCategory(category) {
            // Optional: Implement filtering if desired, or just alert/log for now as per minimal requirement
            console.log(`Filtering by category: ${category}`);
            // To implement filtering, you could re-call renderPosts with filtered array
            // For now, staying simple as requested.
        }
    </script>
