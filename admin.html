<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 | 가람부동산</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- 아이콘: FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Quill.js Editor CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0F172A;
            --accent-color: #D4AF37;
            --bg-color: #F8FAFC;
            --white: #FFFFFF;
            --text-main: #1E293B;
            --text-light: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
        
        .header { background: var(--primary-color); color: var(--white); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--accent-color); }
        .btn-logout { background: transparent; border: 1px solid var(--white); color: var(--white); padding: 8px 16px; border-radius: 4px; cursor: pointer; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 2px solid #E2E8F0; }
        .tab { padding: 12px 24px; cursor: pointer; font-weight: 600; color: var(--text-light); }
        .tab.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); font-weight: 700; }

        .section { display: none; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .section.active { display: block; }

        h2 { margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 14px; }
        
        /* 면적 복합 입력창 스타일 */
        .area-input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            background: #fff;
            padding-right: 15px;
            transition: border-color 0.3s;
        }
        .area-input-wrapper:focus-within {
            border-color: var(--accent-color);
        }
        .area-input-wrapper input {
            border: none;
            flex: 1;
            padding-right: 5px;
            outline: none;
        }
        .area-input-wrapper .area-result {
            font-size: 13px;
            color: var(--accent-color);
            font-weight: 600;
            white-space: nowrap;
        }

        .image-preview { width: 100%; height: 150px; border: 1px dashed #E2E8F0; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f9fafb; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .form-group textarea { height: 100px; resize: vertical; }

        /* Quill Editor 조정 */
        .editor-wrapper { margin-top: 10px; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden; }
        .ql-container { height: 300px; font-family: 'Pretendard', sans-serif; font-size: 14px; }
        .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid #E2E8F0; background: #f8fafc; }
        .ql-editor { line-height: 1.6; }

        .btn-submit { background: var(--primary-color); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; }

        .list-container { margin-top: 40px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #F1F5F9; }
        .list-item:last-child { border-bottom: none; }
        .list-item-info h4 { font-size: 16px; margin-bottom: 4px; }
        .list-item-info p { font-size: 13px; color: var(--text-light); }
        .btn-delete { color: #EF4444; background: #FEE2E2; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div id="auth-check" style="display:none;">
        <header class="header">
            <div class="logo">가람부동산<span>.</span> 관리자 대시보드</div>
            <button class="btn-logout" onclick="logout()">로그아웃</button>
        </header>

        <div class="container">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('property')">매물 관리</div>
                <div class="tab" onclick="switchTab('blog')">블로그 관리</div>
            </div>

            <!-- 매물 등록 섹션 -->
            <div id="property-section" class="section active">
                <h2>새 매물 등록</h2>
                <form id="property-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>이미지 선택 (파일)</label>
                            <input type="file" id="p-image-file" accept="image/*" onchange="previewImage(this)">
                            <div class="image-preview" id="p-preview"><span style="color:#94a3b8; font-size: 12px;">선택된 이미지 없음</span></div>
                            <input type="hidden" id="p-image-base64">
                        </div>
                        <div class="form-group"><label>매물 이름 (아파트명 등)</label><input type="text" id="p-title" placeholder="봉선동 OO아파트" required></div>
                        <div class="form-group">
                            <label>거래 종류</label>
                            <select id="p-deal-type">
                                <option value="매매">매매</option>
                                <option value="전세">전세</option>
                                <option value="월세">월세</option>
                            </select>
                        </div>
                        <div class="form-group"><label>가격 (예: 22억 또는 100/50)</label><input type="text" id="p-price" placeholder="22억" required></div>
                        <div class="form-group"><label>매물 종류</label>
                            <select id="p-type">
                                <option value="아파트">아파트</option><option value="주택">주택</option><option value="상가">상가</option>
                                <option value="토지">토지</option><option value="건물">건물</option><option value="분양권">분양권</option><option value="그 외">그 외</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>면적 (㎡)</label>
                            <div class="area-input-wrapper">
                                <input type="number" id="p-area-num" placeholder="숫자만 입력" step="0.1" oninput="liveUpdateArea(this.value)">
                                <span class="area-result" id="p-area-res">㎡ (0평)</span>
                            </div>
                        </div>
                        <div class="form-group"><label>방 개수</label><input type="number" id="p-beds" value="3"></div>
                        <div class="form-group"><label>욕실 개수</label><input type="number" id="p-baths" value="2"></div>
                    </div>
                    <div class="form-group"><label>상세 설명</label><textarea id="p-desc" placeholder="매물 상세 설명을 입력하세요"></textarea></div>
                    <button type="submit" class="btn-submit">매물 등록하기</button>
                </form>

                <div class="list-container">
                    <h3>등록된 매물 목록 (커스텀)</h3>
                    <div id="property-list"></div>
                </div>
            </div>

            <!-- 블로그 등록 섹션 -->
            <div id="blog-section" class="section">
                <h2>새 블로그 글 작성</h2>
                <form id="blog-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>이미지 선택 (파일)</label>
                            <input type="file" id="b-image-file" accept="image/*" onchange="previewBlogImage(this)">
                            <div class="image-preview" id="b-preview"><span style="color:#94a3b8; font-size: 12px;">선택된 이미지 없음</span></div>
                            <input type="hidden" id="b-image-base64">
                        </div>
                        <div class="form-group"><label>제목</label><input type="text" id="b-title" placeholder="글 제목" required></div>
                        <div class="form-group"><label>카테고리</label><input type="text" id="b-category" placeholder="시장 동향 / 인테리어 등" required></div>
                        <div class="form-group"><label>작성자</label><input type="text" id="b-author" placeholder="김대표" required></div>
                    </div>
                    <div class="form-group" style="grid-column: span 3;">
                        <label>요약 내용 (목록에 표시될 내용)</label>
                        <textarea id="b-excerpt" placeholder="글의 요약을 입력하세요." required></textarea>
                    </div>
                    <div class="form-group" style="grid-column: span 3;">
                        <label>본문 내용 (사진/서식 추가 가능)</label>
                        <div class="editor-wrapper">
                            <div id="blog-editor"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">블로그 포스트 등록</button>
                </form>

                <div class="list-container">
                    <h3>등록된 블로그 포스트 목록 (커스텀)</h3>
                    <div id="blog-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quill.js Editor JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <!-- Firebase SDK Scripts -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "firebase/firestore";

        // Firebase 설정 (사용자 제공)
        const firebaseConfig = {
          apiKey: "AIzaSyC4bxl2efr-a2qlCv9zclP-kaL106Bpvxc",
          authDomain: "garambudongsan.firebaseapp.com",
          projectId: "garambudongsan",
          storageBucket: "garambudongsan.firebasestorage.app",
          messagingSenderId: "610338625520",
          appId: "1:610338625520:web:7c113deb9334a302b62f35"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Quill Editor 초기화
        const quill = new Quill('#blog-editor', {
            theme: 'snow',
            placeholder: '본문 내용을 작성해 주세요. 사진도 넣을 수 있습니다.',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    ['blockquote', 'link', 'image'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        // Auth Check
        if(sessionStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'admin-login.html';
        } else {
            document.getElementById('auth-check').style.display = 'block';
        }

        window.logout = function() {
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'index.html';
        }

        window.switchTab = function(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            if(type === 'property') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('property-section').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('blog-section').classList.add('active');
            }
        }

        // Image Preview logic
        window.previewImage = function(input) {
            const preview = document.getElementById('p-preview');
            const hiddenInput = document.getElementById('p-image-base64');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}">`;
                    hiddenInput.value = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.previewBlogImage = function(input) {
            const preview = document.getElementById('b-preview');
            const hiddenInput = document.getElementById('b-image-base64');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}">`;
                    hiddenInput.value = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.liveUpdateArea = function(val) {
            const resSpan = document.getElementById('p-area-res');
            if(!val) {
                resSpan.innerText = '㎡ (0평)';
                return;
            }
            const m2 = parseFloat(val);
            const pyeong = (m2 * 0.3025).toFixed(1);
            resSpan.innerText = `㎡ (${pyeong}평)`;
        }

        // Property Management
        const propForm = document.getElementById('property-form');
        propForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const imageBase64 = document.getElementById('p-image-base64').value;
            if(!imageBase64) {
                alert('이미지를 선택해 주세요.');
                return;
            }

            const areaNum = document.getElementById('p-area-num').value;
            const areaPyeong = (parseFloat(areaNum) * 0.3025).toFixed(1);
            const areaFullStr = `${areaNum}㎡ (${areaPyeong}평)`;

            const dealType = document.getElementById('p-deal-type').value;
            const badgeColorMap = {
                '매매': '#0F172A',
                '전세': '#475569',
                '월세': '#D4AF37'
            };

            const newProp = {
                id: Date.now(),
                badge: dealType,
                badgeColor: badgeColorMap[dealType] || '#0F172A',
                image: imageBase64,
                title: document.getElementById('p-title').value,
                address: '', 
                price: document.getElementById('p-price').value,
                type: document.getElementById('p-type').value,
                beds: document.getElementById('p-beds').value,
                baths: document.getElementById('p-baths').value,
                area: areaFullStr,
                description: document.getElementById('p-desc').value,
                createdAt: new Date()
            };

            try {
                await addDoc(collection(db, "properties"), newProp);
                propForm.reset();
                document.getElementById('p-preview').innerHTML = '<span style="color:#94a3b8; font-size: 12px;">선택된 이미지 없음</span>';
                document.getElementById('p-area-res').innerText = '㎡ (0평)';
                renderLists();
                alert('매물이 성공적으로 등록되었습니다.');
            } catch (error) {
                console.error("Property Save Error:", error);
                alert('매물 저장 중 오류 발생: ' + error.message + '\n\n(파이어베이스 Firestore 설정과 규칙을 확인해 주세요.)');
            }
        });

        // Blog Management
        const blogForm = document.getElementById('blog-form');
        blogForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const imageBase64 = document.getElementById('b-image-base64').value;
            if(!imageBase64) {
                alert('이미지를 선택해 주세요.');
                return;
            }

            const newPost = {
                id: Date.now(),
                image: imageBase64,
                title: document.getElementById('b-title').value,
                category: document.getElementById('b-category').value,
                author: document.getElementById('b-author').value,
                date: new Date().toLocaleDateString('ko-KR').replace(/ /g, ''),
                excerpt: document.getElementById('b-excerpt').value,
                content: quill.root.innerHTML,
                createdAt: new Date()
            };

            try {
                await addDoc(collection(db, "posts"), newPost);
                blogForm.reset();
                quill.setContents([]);
                document.getElementById('b-preview').innerHTML = '<span style="color:#94a3b8; font-size: 12px;">선택된 이미지 없음</span>';
                renderLists();
                alert('블로그 포스트가 성공적으로 등록되었습니다.');
            } catch (error) {
                console.error("Blog Save Error:", error);
                alert('블로그 저장 중 오류 발생: ' + error.message + '\n\n(파이어베이스 Firestore 설정과 규칙을 확인해 주세요.)');
            }
        });

        async function renderLists() {
            // Render Props
            const propList = document.getElementById('property-list');
            propList.innerHTML = '로딩 중...';
            try {
                const propQuery = query(collection(db, "properties"), orderBy("createdAt", "desc"));
                const propSnap = await getDocs(propQuery);
                propList.innerHTML = propSnap.empty ? '<p>등록된 매물이 없습니다.</p>' : '';
                propSnap.forEach((fbDoc) => {
                    const p = fbDoc.data();
                    const docId = fbDoc.id;
                    propList.innerHTML += `
                        <div class="list-item">
                            <div class="list-item-info"><h4>${p.title}</h4><p>${p.area} | ${p.price}</p></div>
                            <button class="btn-delete" onclick="deleteItem('property', '${docId}')">삭제</button>
                        </div>
                    `;
                });
            } catch(e) { 
                console.error("List Load Error:", e); 
                propList.innerHTML = '불러오기 실패: ' + e.message; 
            }

            // Render Blog
            const blogList = document.getElementById('blog-list');
            blogList.innerHTML = '로딩 중...';
            try {
                const blogQuery = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const blogSnap = await getDocs(blogQuery);
                blogList.innerHTML = blogSnap.empty ? '<p>등록된 포스트가 없습니다.</p>' : '';
                blogSnap.forEach((fbDoc) => {
                    const p = fbDoc.data();
                    const docId = fbDoc.id;
                    blogList.innerHTML += `
                        <div class="list-item">
                            <div class="list-item-info"><h4>${p.title}</h4><p>${p.date} | ${p.author}</p></div>
                            <button class="btn-delete" onclick="deleteItem('blog', '${docId}')">삭제</button>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); blogList.innerHTML = '불러오기 실패'; }
        }

        window.deleteItem = async function(type, docId) {
            if(!confirm('정말로 삭제하시겠습니까?')) return;
            const collectionName = type === 'property' ? 'properties' : 'posts';
            try {
                await deleteDoc(doc(db, collectionName, docId));
                renderLists();
            } catch (error) {
                console.error("Delete Error:", error);
                alert('삭제 중 오류 발생: ' + error.message);
            }
        }

        renderLists();
    </script>
</body>
</html>
